name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project BlueprintsBar.xcodeproj \
            -scheme BlueprintsBar \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/BlueprintsBar.zip" BlueprintsBar.app

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: BlueprintsBar.zip
          generate_release_notes: true
